# Render.com deployment manifest.
# After connecting the GitHub repo on render.com, this file lets Render
# auto-create the service with the right settings.
services:
  - type: web
    name: no-ball-wide-ball
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
